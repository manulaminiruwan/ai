<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano AI - Next Gen Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #131314;
            color: #e3e3e3;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: #1e1f20;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid #333;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(45deg, #4285f4, #9b51e0, #ea4335);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .new-chat-btn {
            background-color: #1a1a1a;
            color: #8e9196;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .new-chat-btn:hover {
            background-color: #282a2c;
            color: #fff;
        }

        /* Main Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #131314;
            position: relative;
        }

        /* Welcome Screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .welcome-screen h1 {
            font-size: 40px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff7b00, #ff007b, #9b51e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-screen p {
            color: #8e9196;
            font-size: 16px;
        }

        /* Chat Messages Area */
        .messages-box {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15% 120px 15%;
            display: none;
        }

        .message {
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .user-message .avatar {
            background-color: #4285f4;
            color: white;
        }

        .ai-message .avatar {
            background: linear-gradient(45deg, #9b51e0, #ff007b);
            color: white;
        }

        .message .content {
            line-height: 1.6;
            font-size: 16px;
            color: #e3e3e3;
            padding-top: 5px;
            white-space: pre-line;
        }

        /* Input Area Styling */
        .input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15% 30px 15%;
            background: linear-gradient(transparent, #131314 30%);
        }

        .input-wrapper {
            background-color: #1e1f20;
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: border 0.3s ease;
        }

        .input-wrapper:focus-within {
            border: 1px solid #444;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #e3e3e3;
            font-size: 16px;
            padding: 8px 10px;
        }

        .input-wrapper input::placeholder {
            color: #8e9196;
        }

        .send-btn {
            background: none;
            border: none;
            color: #4285f4;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            padding: 0 10px;
            transition: color 0.2s;
        }

        .send-btn:hover {
            color: #fff;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }

        /* Loading Animation */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding-top: 12px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #8e9196;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="logo">Nano AI</div>
            <button class="new-chat-btn" onclick="resetChat()">+ New Chat</button>
        </div>
        <div style="font-size: 12px; color: #666; text-align: center;">Powered by Gemini API</div>
    </div>

    <div class="chat-container">
        
        <div class="welcome-screen" id="welcomeScreen">
            <h1>How can Nano AI help you today?</h1>
            <p>Ask anything, write code, or translate text instantly.</p>
        </div>

        <div class="messages-box" id="messagesBox"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Message Nano AI..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
            <div class="footer-text">Nano AI can make mistakes. Consider checking important information.</div>
        </div>
    </div>

    <script>
        // 🔐 Security & Model Update: Prompts for the API key and uses the modern gemini-1.5-flash model
        const API_KEY = prompt("Please enter your Gemini API Key to use Nano AI:");
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const messagesBox = document.getElementById('messagesBox');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const userInput = document.getElementById('userInput');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            // Check if API Key was provided
            if (!API_KEY) {
                alert("API Key is required to chat! Please refresh the page and enter a valid Gemini API Key.");
                return;
            }

            const text = userInput.value.trim();
            if (!text) return;

            welcomeScreen.style.display = 'none';
            messagesBox.style.display = 'block';

            appendMessage('U', text, 'user-message');
            userInput.value = '';

            const loadingId = appendLoading();
            messagesBox.scrollTop = messagesBox.scrollHeight;

            try {
                // Fetch request updated for Gemini 1.5 structures
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                // Reading content from Gemini API JSON response
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    appendMessage('N', aiResponse, 'ai-message');
                } else {
                    appendMessage('N', 'Sorry, I encountered an issue. Please verify your API key and try again.', 'ai-message');
                }

            } catch (error) {
                console.error(error);
                document.getElementById(loadingId).remove();
                appendMessage('N', 'Error connecting to the server. Please check your API key or network connection.', 'ai-message');
            }

            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        function appendMessage(avatar, text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            
            messageDiv.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="content">${escapeHtml(text)}</div>
            `;
            
            messagesBox.appendChild(messageDiv);
        }

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai-message';
            messageDiv.id = id;
            
            messageDiv.innerHTML = `
                <div class="avatar">N</div>
                <div class="content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            
            messagesBox.appendChild(messageDiv);
            return id;
        }

        function resetChat() {
            messagesBox.innerHTML = '';
            messagesBox.style.display = 'none';
            welcomeScreen.style.display = 'flex';
            userInput.value = '';
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
